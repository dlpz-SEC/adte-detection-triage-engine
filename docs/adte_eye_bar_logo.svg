<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>ADTE cybernetic eye — bar-constructed geometric mark</title>
  <desc>Eye logo built entirely from horizontal rectangular bars in SentinelOne style</desc>

  <!-- HERO: logo mark on dark field -->
  <rect x="190" y="30" width="300" height="210" rx="4" fill="#0a0a0a"/>

  <!-- Logo centered at (340,135), scale=3 -->
  <g transform="translate(340,135) scale(3)" fill="#c0392b">
    <!-- bar 1 — top solid, narrow -->
    <rect x="-12" y="-22" width="24" height="5"/>
    <!-- bar 2 — split, iris zone -->
    <rect x="-23" y="-13" width="14" height="5"/>
    <rect x="9"   y="-13" width="14" height="5"/>
    <!-- bar 3 — widest, split, pupil sits in gap -->
    <rect x="-31" y="-4"  width="19" height="5"/>
    <rect x="12"  y="-4"  width="19" height="5"/>
    <!-- pupil: solid block in center of gap -->
    <rect x="-6"  y="-4"  width="12" height="5"/>
    <!-- bar 4 — split, iris zone, mirrors bar 2 -->
    <rect x="-23" y="5"   width="14" height="5"/>
    <rect x="9"   y="5"   width="14" height="5"/>
    <!-- bar 5 — bottom solid, narrow -->
    <rect x="-12" y="14"  width="24" height="5"/>
    <!-- corner scan tails -->
    <rect x="-42" y="-2"  width="10" height="2" opacity="0.5"/>
    <rect x="32"  y="-2"  width="10" height="2" opacity="0.5"/>
  </g>

  <!-- label under hero mark -->
  <text x="340" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#333" letter-spacing="4">AUTONOMOUS DETECTION &amp; TRIAGE ENGINE</text>

  <!-- WORDMARK LOCKUP -->
  <text x="340" y="318" text-anchor="middle" font-family="monospace" font-size="9" fill="#444" letter-spacing="3">HORIZONTAL LOCKUP</text>

  <rect x="130" y="330" width="420" height="56" rx="3" fill="#0a0a0a"/>

  <!-- Logo small-scale in lockup, scale=0.72 -->
  <g transform="translate(200,358) scale(0.72)" fill="#c0392b">
    <rect x="-12" y="-22" width="24" height="5"/>
    <rect x="-23" y="-13" width="14" height="5"/>
    <rect x="9"   y="-13" width="14" height="5"/>
    <rect x="-31" y="-4"  width="19" height="5"/>
    <rect x="12"  y="-4"  width="19" height="5"/>
    <rect x="-6"  y="-4"  width="12" height="5"/>
    <rect x="-23" y="5"   width="14" height="5"/>
    <rect x="9"   y="5"   width="14" height="5"/>
    <rect x="-12" y="14"  width="24" height="5"/>
  </g>

  <!-- Wordmark -->
  <text x="228" y="352" font-family="monospace" font-size="18" fill="white" letter-spacing="5" font-weight="bold">ADTE</text>
  <text x="228" y="370" font-family="monospace" font-size="8"  fill="#c0392b" letter-spacing="3">DETECTION ENGINE</text>

  <!-- NAV BAR CONTEXT -->
  <text x="340" y="413" text-anchor="middle" font-family="monospace" font-size="9" fill="#444" letter-spacing="3">AT ACTUAL NAV BAR SIZE</text>

  <rect x="130" y="424" width="420" height="44" rx="3" fill="#0a0a0a"/>

  <!-- divider line in nav -->
  <line x1="270" y1="432" x2="270" y2="460" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Logo at nav scale=0.45 -->
  <g transform="translate(165,446) scale(0.45)" fill="#c0392b">
    <rect x="-12" y="-22" width="24" height="5"/>
    <rect x="-23" y="-13" width="14" height="5"/>
    <rect x="9"   y="-13" width="14" height="5"/>
    <rect x="-31" y="-4"  width="19" height="5"/>
    <rect x="12"  y="-4"  width="19" height="5"/>
    <rect x="-6"  y="-4"  width="12" height="5"/>
    <rect x="-23" y="5"   width="14" height="5"/>
    <rect x="9"   y="5"   width="14" height="5"/>
    <rect x="-12" y="14"  width="24" height="5"/>
  </g>

  <text x="188" y="443" font-family="monospace" font-size="12" fill="white" letter-spacing="3" font-weight="bold">ADTE</text>
  <text x="188" y="457" font-family="monospace" font-size="7"  fill="#c0392b" letter-spacing="2">DETECTION ENGINE</text>

  <!-- Nav items (right side, simulated) -->
  <text x="300" y="448" font-family="monospace" font-size="9" fill="#444">Alert Queue</text>
  <text x="390" y="448" font-family="monospace" font-size="9" fill="#444">Threat Intel</text>
  <text x="480" y="448" font-family="monospace" font-size="9" fill="#444">Settings</text>
</svg>
