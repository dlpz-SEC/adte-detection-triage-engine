# Curated MITRE ATT&CK → rule-text / signal mapping
# Used for deterministic technique labeling (get_techniques, lookup_by_rule_text)
# and by the llm_enrichment keyword path.
#
# MATCHING SEMANTICS (mitre_mapper.lookup_by_rule_text):
#   - case-insensitive SUBSTRING match, FIRST entry wins.
#   - Therefore: sub-technique entries MUST come before their generic parent
#     (e.g. T1110.003 password spray before T1110 brute force), and no keyword
#     may be a substring of an engine signal name (impossible_travel,
#     mfa_fatigue, ip_reputation, device_novelty, login_hour_anomaly) except
#     inside that signal's own entry at the bottom.
#   - Keywords come in underscore form (signal/synthetic text) and space form
#     (real Wazuh rule descriptions, e.g. "sshd: brute force trying ...").
#   - The cluster_context signal (Phase 31) is DELIBERATELY absent: case
#     correlation is meta-context, not a technique — sibling alerts carry
#     their own technique IDs, already unioned into the case.

mappings:

